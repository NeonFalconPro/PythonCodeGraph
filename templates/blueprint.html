<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeGraph - 蓝图模式</title>
    <!-- LiteGraph.js CDN -->
    <link rel="stylesheet" href="/static/css/litegraph.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/blueprint.css">
</head>
<body data-i18n-title-key="blueprint.title">
    <button id="langToggle" class="lang-toggle"></button>
    <div class="app-container">
        <button id="sidebarToggleBtn" class="sidebar-toggle-btn" type="button" title="折叠侧边栏">⮜</button>
        <!-- 左侧侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="/" class="back-link" data-i18n="common.switch_mode">← 切换模式</a>
                <h1 data-i18n="blueprint.page_title">🔧 蓝图模式</h1>
                <p class="subtitle" data-i18n="blueprint.subtitle">基于 LiteGraph.js 的蓝图编辑器</p>
            </div>

            <!-- 路径输入 -->
            <div class="control-group">
                <label data-i18n="common.project_path">项目路径</label>
                <div class="path-input-group">
                    <input type="text" id="projectPath" data-i18n-placeholder="common.path_placeholder" placeholder="输入 Python 项目路径..."
                           class="input-field" value="D:\8_python\CodeGraph">
                    <button id="browseBtn" class="btn btn-secondary" data-i18n-title="common.browse_title" title="浏览目录">📁</button>
                </div>
                <button id="analyzeBtn" class="btn btn-primary" data-i18n="common.start_analyze">🚀 开始解析</button>
            </div>

            <!-- 搜索 -->
            <div class="control-group">
                <label data-i18n="common.search_node">🔍 搜索节点</label>
                <div class="search-input-group">
                    <input type="text" id="searchInput" data-i18n-placeholder="common.search_placeholder" placeholder="输入节点名称搜索..."
                           class="input-field">
                    <span id="searchCount" class="search-count"></span>
                </div>
            </div>

            <!-- 节点类型过滤 -->
            <div class="control-group">
                <label data-i18n="common.node_filter">节点类型过滤</label>
                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <input type="checkbox" value="package" checked class="node-filter"> <span data-i18n="common.node_package">📦 包</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" value="module" checked class="node-filter"> <span data-i18n="common.node_module">📄 模块</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" value="class" checked class="node-filter"> <span data-i18n="common.node_class">🏷️ 类</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" value="function" checked class="node-filter"> <span data-i18n="common.node_function">⚡ 函数</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" value="method" checked class="node-filter"> <span data-i18n="common.node_method">🔧 方法</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" value="constant" checked class="node-filter"> <span data-i18n="common.node_constant">📌 常量</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" value="external" checked class="node-filter"> <span data-i18n="common.node_external">🔗 外部库</span>
                    </label>
                </div>
            </div>

            <!-- 关系类型过滤 -->
            <div class="control-group">
                <label data-i18n="common.edge_filter">关系类型过滤</label>
                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <input type="checkbox" value="imports" checked class="edge-filter">
                        <span class="edge-color" style="background:#E74C3C"></span> <span data-i18n="common.edge_imports">导入</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" value="inherits" checked class="edge-filter">
                        <span class="edge-color" style="background:#3498DB"></span> <span data-i18n="common.edge_inherits">继承</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" value="contains" checked class="edge-filter">
                        <span class="edge-color" style="background:#95A5A6"></span> <span data-i18n="common.edge_contains">包含</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" value="calls" checked class="edge-filter">
                        <span class="edge-color" style="background:#2ECC71"></span> <span data-i18n="common.edge_calls">调用</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" value="decorates" checked class="edge-filter">
                        <span class="edge-color" style="background:#9B59B6"></span> <span data-i18n="common.edge_decorates">装饰</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" value="instantiates" checked class="edge-filter">
                        <span class="edge-color" style="background:#F39C12"></span> <span data-i18n="common.edge_instantiates">实例化</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" value="uses" checked class="edge-filter">
                        <span class="edge-color" style="background:#00CEC9"></span> <span data-i18n="common.edge_uses">使用</span>
                    </label>
                </div>
            </div>

            <!-- 布局控制 -->
            <div class="control-group">
                <button id="arrangeBtn" class="btn btn-secondary" data-i18n="common.auto_arrange">📐 自动排列</button>
                <button id="fitBtn" class="btn btn-secondary" data-i18n="common.adapt_view">🔍 适应视图</button>
            </div>

            <!-- 统计信息 -->
            <div class="control-group" id="statsPanel" style="display:none">
                <label data-i18n="common.stats">📊 项目统计</label>
                <div id="statsContent" class="stats-content"></div>
            </div>
        </aside>

        <!-- 主内容区域 -->
        <main class="main-content">
            <!-- 加载中 -->
            <div id="loading" class="loading-overlay" style="display:none">
                <div class="spinner"></div>
                <p data-i18n="common.loading">正在解析项目...</p>
            </div>

            <!-- 欢迎页面 -->
            <div id="welcomeScreen" class="welcome-screen">
                <div class="welcome-content">
                    <h2 data-i18n="blueprint.welcome_title">🔧 蓝图模式</h2>
                    <p data-i18n="blueprint.welcome_desc">基于 LiteGraph.js 的代码蓝图编辑器</p>
                    <div class="welcome-steps">
                        <div class="step">
                            <span class="step-num">1</span>
                            <span data-i18n="blueprint.step1">在左侧输入 Python 项目路径</span>
                        </div>
                        <div class="step">
                            <span class="step-num">2</span>
                            <span data-i18n="blueprint.step2">点击"开始解析"生成蓝图</span>
                        </div>
                        <div class="step">
                            <span class="step-num">3</span>
                            <span data-i18n="blueprint.step3">拖拽节点、缩放画布自由探索</span>
                        </div>
                    </div>
                    <div class="legend">
                        <h3 data-i18n="blueprint.legend_title">蓝图节点说明</h3>
                        <div class="legend-grid">
                            <div class="legend-section">
                                <h4 data-i18n="blueprint.legend_node_title">节点类型</h4>
                                <div class="legend-item"><span class="dot" style="background:#FF6B6B"></span> <span data-i18n="common.node_package">📦 包</span></div>
                                <div class="legend-item"><span class="dot" style="background:#4ECDC4"></span> <span data-i18n="common.node_module">📄 模块</span></div>
                                <div class="legend-item"><span class="dot" style="background:#45B7D1"></span> <span data-i18n="common.node_class">🏷️ 类</span></div>
                                <div class="legend-item"><span class="dot" style="background:#96CEB4"></span> <span data-i18n="common.node_function">⚡ 函数</span></div>
                                <div class="legend-item"><span class="dot" style="background:#FFEAA7"></span> <span data-i18n="common.node_method">🔧 方法</span></div>
                                <div class="legend-item"><span class="dot" style="background:#DDA0DD"></span> <span data-i18n="common.node_constant">📌 常量</span></div>
                                <div class="legend-item"><span class="dot" style="background:#FF9F43"></span> <span data-i18n="common.node_external">🔗 外部库</span></div>
                            </div>
                            <div class="legend-section">
                                <h4 data-i18n="blueprint.legend_edge_title">连线颜色</h4>
                                <div class="legend-item"><span class="line" style="background:#E74C3C"></span> <span data-i18n="common.edge_imports">导入</span></div>
                                <div class="legend-item"><span class="line" style="background:#3498DB"></span> <span data-i18n="common.edge_inherits">继承</span></div>
                                <div class="legend-item"><span class="line" style="background:#95A5A6"></span> <span data-i18n="common.edge_contains">包含</span></div>
                                <div class="legend-item"><span class="line" style="background:#2ECC71"></span> <span data-i18n="common.edge_calls">调用</span></div>
                                <div class="legend-item"><span class="line" style="background:#9B59B6"></span> <span data-i18n="common.edge_decorates">装饰</span></div>
                                <div class="legend-item"><span class="line" style="background:#F39C12"></span> <span data-i18n="common.edge_instantiates">实例化</span></div>
                                <div class="legend-item"><span class="line" style="background:#00CEC9"></span> <span data-i18n="common.edge_uses">使用</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- LiteGraph 画布容器 -->
            <div id="blueprintContainer" class="blueprint-container" style="display:none">
                <button id="backToFullBtn" class="btn btn-secondary blueprint-back-btn" style="display:none" data-i18n="common.back_to_full">↩ 返回全图</button>
                <canvas id="blueprintCanvas"></canvas>
            </div>

            <!-- 节点详情面板 -->
            <div id="detailPanel" class="detail-panel" style="display:none">
                <div class="detail-header">
                    <h3 id="detailTitle" data-i18n="blueprint.detail_title">节点详情</h3>
                    <button id="closeDetail" class="close-btn">✕</button>
                </div>
                <div id="detailContent" class="detail-content"></div>
            </div>
        </main>
    </div>

    <!-- 目录浏览弹窗 -->
    <div id="browseModal" class="modal" style="display:none">
        <div class="modal-content">
            <div class="modal-header">
                <h3 data-i18n="common.browse_title">📂 选择项目文件夹</h3>
                <button id="closeBrowse" class="close-btn">✕</button>
            </div>
            <div class="modal-path">
                <button id="parentDirBtn" class="btn btn-small" data-i18n="common.browse_parent">⬆ 上级</button>
                <span id="currentPath" class="current-path"></span>
            </div>
            <div id="dirList" class="dir-list"></div>
            <div class="modal-footer">
                <button id="selectDirBtn" class="btn btn-primary" data-i18n="common.browse_select">✅ 选择此文件夹</button>
                <button id="cancelBrowse" class="btn btn-secondary" data-i18n="common.browse_cancel">取消</button>
            </div>
        </div>
    </div>

    <script src="/static/js/i18n.js"></script>
    <script src="/static/js/litegraph.min.js"></script>
    <script src="/static/js/blueprint.js"></script>
    <script>
        window.CodeGraphI18n.setupLanguageToggle('langToggle');
    </script>
</body>
</html>
