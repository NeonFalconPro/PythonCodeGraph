<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeGraph - Python 代码知识图谱</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
        }
        .mode-selector {
            text-align: center;
            max-width: 800px;
            padding: 40px 20px;
        }
        .mode-selector h1 {
            font-size: 3rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe, #74b9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .mode-selector > p {
            color: var(--text-secondary);
            font-size: 1.15rem;
            margin-bottom: 48px;
        }
        .mode-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
        }
        .mode-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 36px 28px;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .mode-card:hover {
            border-color: var(--accent);
            transform: translateY(-6px);
            box-shadow: 0 12px 40px rgba(108, 92, 231, 0.25);
        }
        .mode-icon {
            font-size: 3.5rem;
            margin-bottom: 16px;
        }
        .mode-card h2 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        .mode-card > p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 20px;
        }
        .mode-card ul {
            list-style: none;
            text-align: left;
            width: 100%;
        }
        .mode-card li {
            padding: 6px 0;
            font-size: 0.9rem;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
        }
        .mode-card li:last-child {
            border-bottom: none;
        }
        .mode-card li::before {
            content: "✦ ";
            color: var(--accent);
        }
        .mode-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 16px;
        }
        .badge-stable {
            background: rgba(46, 204, 113, 0.15);
            color: #2ecc71;
        }
        .badge-new {
            background: rgba(108, 92, 231, 0.15);
            color: #a29bfe;
        }
        @media (max-width: 640px) {
            .mode-cards {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body data-i18n-title-key="index.title">
    <button id="langToggle" class="lang-toggle"></button>
    <div class="mode-selector">
        <h1 data-i18n="index.heading">🌐 CodeGraph</h1>
        <p data-i18n="index.subtitle">Python 代码知识图谱生成与可视化工具</p>
        <div class="mode-cards">
            <a href="/standard" class="mode-card">
                <div class="mode-icon">📊</div>
                <h2 data-i18n="index.standard_title">标准模式</h2>
                <p data-i18n="index.standard_desc">基于 vis-network 的力导向图谱可视化</p>
                <ul>
                    <li data-i18n="index.standard_feat1">力导向 / 层级多种布局</li>
                    <li data-i18n="index.standard_feat2">节点高亮与邻域聚焦</li>
                    <li data-i18n="index.standard_feat3">节点搜索与实时过滤</li>
                    <li data-i18n="index.standard_feat4">外部库智能分组</li>
                </ul>
                <span class="mode-badge badge-stable" data-i18n="index.stable_badge">稳定版</span>
            </a>
            <a href="/blueprint" class="mode-card">
                <div class="mode-icon">🔧</div>
                <h2 data-i18n="index.blueprint_title">蓝图模式</h2>
                <p data-i18n="index.blueprint_desc">基于 LiteGraph.js 的蓝图式节点编辑器</p>
                <ul>
                    <li data-i18n="index.blueprint_feat1">UE 蓝图风格节点编辑器</li>
                    <li data-i18n="index.blueprint_feat2">输入/输出插槽连线</li>
                    <li data-i18n="index.blueprint_feat3">自由拖拽编排布局</li>
                    <li data-i18n="index.blueprint_feat4">节点类型与关系过滤</li>
                </ul>
                <span class="mode-badge badge-new" data-i18n="index.new_badge">新功能</span>
            </a>
        </div>
    </div>
    <script src="/static/js/i18n.js"></script>
    <script>
        window.CodeGraphI18n.setupLanguageToggle('langToggle');
    </script>
</body>
</html>
